services:
  - type: web
    name: traveldost-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_GEOCODING_API_KEY
        sync: false
      - key: PORT
        value: 5000
